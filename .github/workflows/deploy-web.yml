name: Deploy web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor WebAssembly
        run: dotnet publish OldenEra.Web/OldenEra.Web.csproj -c Release -o publish

      - name: Rewrite base href for GitHub Pages subpath
        run: |
          sed -i 's|<base href="/" />|<base href="/Olden-Era---Template-Generator/" />|' publish/wwwroot/index.html
          sed -i 's|<base href="/"/>|<base href="/Olden-Era---Template-Generator/"/>|' publish/wwwroot/index.html
          grep -o '<base href="[^"]*"' publish/wwwroot/index.html

      - name: Disable Jekyll processing
        run: touch publish/wwwroot/.nojekyll

      - name: Add 404.html fallback for SPA routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/wwwroot
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'deploy: ${{ github.sha }}'
